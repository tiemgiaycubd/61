        body { font-family: 'Lexend', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* HOẠT ẢNH NỀN AURORA */
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-aurora {
            background-size: 200% 200%;
            animation: gradient-move 12s ease infinite;
        }

        /* HOẠT ẢNH VẬT THỂ BAY CHẬM */
        @keyframes orb-float-1 {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        @keyframes orb-float-2 {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(15px) scale(0.95); }
        }
        .animate-float-slow-1 { animation: orb-float-1 8s ease-in-out infinite; }
        .animate-float-slow-2 { animation: orb-float-2 10s ease-in-out infinite; }

        /* HOẠT ẢNH TRƯỢT HIỆN KHI CUỘN TRANG */
        .reveal-item {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hiệu ứng loading nhấp nháy */
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }

        /* HOẠT ẢNH NHỊP THỞ HÀO QUANG CHO NÚT BẤM CHÍNH (DYNAMIC GLOW) */
        @keyframes button-glow {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.4), 0 0 0 0 rgba(244, 63, 94, 0.5); 
            }
            50% { 
                transform: scale(1.03); 
                box-shadow: 0 20px 35px -5px rgba(249, 115, 22, 0.6), 0 0 15px 10px rgba(249, 115, 22, 0); 
            }
        }
        .animate-btn-glow {
            animation: button-glow 2.5s infinite ease-in-out;
        }

        /* HIỆU ỨNG LUỒNG SÁNG QUÉT SANG CHẢNH (SHIMMER) */
        @keyframes shimmer-sweep {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }
        .animate-shimmer {
            position: relative;
            overflow: hidden;
        }
        .animate-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-150%) skewX(-25deg);
            animation: shimmer-sweep 3s infinite ease-in-out;
        }
    </style>
